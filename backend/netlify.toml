[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "."

[build.environment]
  SECRETS_SCAN_ENABLED = "true" # You can set this to "false" if the secret scanner keeps blocking you incorrectly

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/"
  status = 200
  force = true
